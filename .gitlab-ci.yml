# Static Application Security Testing (SAST)
# https://semgrep.dev/docs/semgrep-ci/sample-ci-configs/#sample-gitlab-cicd-configuration-snippet
# docker run -v $(pwd):/opt/app --rm -it registry.gitlab.com/gitlab-ci-utils/gitlab-semgrep-plus:latest sh
sast:
  stage: test
  image: returntocorp/semgrep:latest
  # image: semgrep/semgrep
  # image: registry.gitlab.com/gitlab-ci-utils/gitlab-semgrep-plus:latest
  before_script: []
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  # only:
  #   - merge_requests
  variables:
    SEARCH_MAX_DEPTH: 20
    SEMGREP_GITLAB_JSON: '1'
    SEMGREP_APP_TOKEN: $SEMGREP_APP_TOKEN
  script:
    # auth
    # - semgrep ci --gitlab-sast --no-suppress-errors > gl-sast-report.json || echo "Semgrep failed, but the pipeline will continue."
    - semgrep ci --gitlab-sast -o gl-sast-report.json || echo "Semgrep failed, but the pipeline will continue."
    # - semgrep scan --json -o gl-sast-report.json || echo "Semgrep failed, but the pipeline will continue."
  after_script:
    - echo "SAST analysis completed. Check the GitLab web page for the report."
  artifacts:
    reports:
      sast: gl-sast-report.json
    # expire_in: 1 week
    # when: always

# docker run -v $(pwd):/opt/app --rm -it registry.gitlab.com/security-products/gemnasium:latest sh
dependency-scanning:
  stage: test
  image: registry.gitlab.com/security-products/gemnasium:latest
  before_script: []
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  # only:
  #   - merge_requests
  script:
    - /analyzer run || echo "Gemnasium failed, but the pipeline will continue."
  after_script:
    - echo "Dependency scanning completed. Check the GitLab web page for the report."
  artifacts:
    paths:
      - '**/gl-sbom-*.cdx.json'
      - '**/gl-dependency-scanning-report.json'
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
      cyclonedx: '**/gl-sbom-*.cdx.json'

