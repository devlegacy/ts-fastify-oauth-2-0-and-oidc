test:
  stage: test
  # only:
  # - master
  # - merge_requests
  script:
    - echo "Using Node.js $NODE_VERSION"
    - fnm use $NODE_VERSION
    # - nvm use $NODE_VERSION
    - pnpm install
    - pnpm run lint
    - pnpm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  parallel:
    matrix:
      - NODE_VERSION: ['21.x', '22.x']
  # cache:
  #   paths:
  #     - node_modules/
  #   key: "${CI_COMMIT_REF_SLUG}-node_modules-${CI_PIPELINE_ID}"

build:
  stage: build
  # only:
  # - master
  # - merge_requests
  script:
    - echo "Using Node.js $NODE_VERSION"
    - fnm use $NODE_VERSION
    # - nvm use $NODE_VERSION
    - pnpm install
    - pnpm run build --if-present
  # needs: ["test"]
  artifacts:
    paths:
      - build/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  parallel:
    matrix:
      - NODE_VERSION: ['21.x', '22.x']

deploy_staging:
  stage: deploy
  before_script: []
  # only:
  #   - master
  script:
    - echo "Deploying to staging server"
  # needs: ["build"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
  # needs:
  #   - job: test
  #     artifacts: true
  #   - job: build
  #     artifacts: true

deploy_production:
  stage: deploy
  before_script: []
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
  # before_script:
  #   - curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-20.10.7.tgz -o docker.tgz
  #   - tar xzvf docker.tgz --strip 1 -C /usr/local/bin docker/docker
  #   - dockerd-entrypoint.sh &
  #   - sleep 20  # Give Docker some time to start
  # only:
  #   - master
  script:
    - echo "Deploying to staging server"
    # - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
    - apk add --no-cache curl
    - echo "${CI_PROJECT_NAME}"
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t $DOCKER_USERNAME/${CI_PROJECT_NAME}:latest .
    - docker push $DOCKER_USERNAME/${CI_PROJECT_NAME}:latest
    # Trigger Render.com deployment
    - curl -X POST ${RENDER_DEPLOY_HOOK}
  when: manual
  # needs: ["build"]
  # dependencies: ["build"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
  # needs:
  #   - job: test
  #     artifacts: true
  #   - job: build
  #     artifacts: true

# docker run -v $(pwd):/opt/app --rm -it registry.gitlab.com/security-products/api-security:latest sh
# docker run -v $(pwd):/opt/app --rm -it registry.gitlab.com/security-products/api-security:3-fips sh
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Security/DAST-API.gitlab-ci.yml
# https://gitlab.com/gitlab-org/security-products
# docker run -v $(pwd):/opt/app --rm -it registry.gitlab.com/security-products/dast:latest sh
# http://host.docker.internal:3000
# /analyze -t http://host.docker.internal:3000 -r ./report.html
# /analyze -t http://host.docker.internal:3000/api/status -r /opt/app/report.html
dast_api:
  stage: deploy
  image: registry.gitlab.com/security-products/dast:latest
  before_script: []
  allow_failure: true
  script:
    - /analyze -t "${APP_URL}" || echo "DAST failed, but the pipeline will continue."
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'
  artifacts:
    paths:
      - 'gl-dast-report.json'
    reports:
      dast: gl-dast-report.json
